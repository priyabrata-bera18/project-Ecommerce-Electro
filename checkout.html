<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Electro</title>

    <link rel="stylesheet" href="Assets/bootstrap-5.3.7-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            padding-top: 180px;
            background: #f7f7f7;
        }

        .checkout-box {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .product-thumbnail {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }

        .section-title {
            font-weight: 700;
            font-size: 22px;
            border-left: 5px solid #d10024;
            padding-left: 12px;
        }

        .payment-method input {
            accent-color: #d10024;
        }

        .btn-checkout {
            background-image: linear-gradient(to right, #ff5f6d, #ffc371) !important;
            color: #fff !important;
            font-size: 18px;
            padding: 12px;
            border-radius: 50px;
            width: 100%;
            font-weight: bold;
        }

        /* Checkout Header Background */
        .page-header {
            background: linear-gradient(rgba(0, 0, 0, .6), rgba(0, 0, 0, .6)),
                url("https://images.unsplash.com/photo-1580894908361-967195033215?q=80&w=2000") center/cover no-repeat;
            height: 300px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="products.js"></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="page-header d-flex flex-column justify-content-center text-center text-white">
        <h1 class="fw-bold display-4">Checkout</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item">
                    <a href="index.html" class="text-white text-decoration-none">Home</a>
                </li>
                <li class="breadcrumb-item">
                    <a href="pages.html" class="text-white text-decoration-none">Pages</a>
                </li>
                <li class="breadcrumb-item text-danger fw-bold" aria-current="page">Checkout</li>
            </ol>
        </nav>
    </div>







    <div class="container my-5">
        <div class="row g-4">

            <!-- Left Side: Billing + Payment -->
            <div class="col-lg-8">

                <!-- Billing Info -->
                <div class="checkout-box mb-4">
                    <h5 class="section-title mb-3"><i class="fa-solid fa-user me-2"></i>Billing Details</h5>

                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" class="form-control p-3" placeholder="Full Name"></div>
                        <div class="col-md-6"><input type="email" class="form-control p-3" placeholder="Email"></div>
                        <div class="col-md-6"><input type="text" class="form-control p-3" placeholder="Phone"></div>
                        <div class="col-md-6"><input type="text" class="form-control p-3" placeholder="City"></div>
                        <div class="col-12"><input type="text" class="form-control p-3" placeholder="Full Address">
                        </div>
                        <div class="col-12"><textarea class="form-control p-3" rows="3"
                                placeholder="Order Notes (Optional)"></textarea></div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="checkout-box">
                    <h5 class="section-title mb-3"><i class="fa-solid fa-credit-card me-2"></i>Payment Method</h5>

                    <div class="payment-method p-2">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="pay" checked>
                            <label class="form-check-label">Cash on Delivery</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="pay">
                            <label class="form-check-label">UPI / Wallet</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="pay">
                            <label class="form-check-label">Credit / Debit Card</label>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Right Side: Cart Summary -->
            <div class="col-lg-4">
                <div class="checkout-box">
                    <h5 class="section-title mb-3"><i class="fa-solid fa-cart-shopping me-2"></i>Order Summary</h5>

                    <!-- Example Dynamic Product Item -->
                    <div id="checkout-products">

                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <div class="d-flex align-items-center gap-3">
                                <img src="Assets/Images/pngegg (2).png" class="product-thumbnail" alt="">
                                <div><strong>BoAt Rockerz 425</strong><br><small>Qty: 1</small></div>
                            </div>
                            <strong class="text-danger">₹1,099</strong>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <div class="d-flex align-items-center gap-3">
                                <img src="Assets/Images/pngegg.png" class="product-thumbnail" alt="">
                                <div><strong>Sony Alpha a7 III</strong><br><small>Qty: 1</small></div>
                            </div>
                            <strong class="text-danger">₹82,000</strong>
                        </div>

                    </div>

                    <!-- Totals -->
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <strong>₹83,099</strong>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Shipping</span>
                        <strong class="text-success">FREE</strong>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="fw-bold fs-5">Total</span>
                        <span class="fw-bold fs-5 text-danger">₹83,099</span>
                    </div>

                    <button class="btn-checkout">Place Order</button>
                </div>
            </div>

        </div>
    </div>


    <div id="footer-placeholder"></div>


    <script>

        $(function () {
            // হেডার লোড করা হচ্ছে
            $("#header-placeholder").load("header.html", function () {

                var path = window.location.pathname;
                var page = path.split("/").pop();
                if (page === "") page = "index.html";

                $('.navbar-nav .nav-link').removeClass('active');
                $('.dropdown-item').removeClass('active');

                $('.navbar-nav a').each(function () {
                    var linkHref = $(this).attr('href');

                    if (linkHref === page) {
                        $(this).addClass('active');

                        if ($(this).hasClass('dropdown-item')) {
                            $(this).closest('.nav-item.dropdown').find('.nav-link.dropdown-toggle').addClass('active');
                        }
                    }
                });


                function fixNavbarGap() {
                    const navbar1 = document.querySelector('.navbar-1');
                    const navbar2 = document.querySelector('.navbar-2');

                    if (navbar1 && navbar2) {
                        const height1 = navbar1.offsetHeight;
                        navbar2.style.top = height1 + 'px';
                        const height2 = navbar2.offsetHeight;
                        document.body.style.paddingTop = (height1 + height2 + 10) + 'px';
                    }
                }


                setTimeout(fixNavbarGap, 50);
                window.addEventListener('resize', fixNavbarGap);

                
                const offcanvasElement = document.getElementById('offcanvasNavbar');
                if (offcanvasElement) {
                    offcanvasElement.addEventListener('show.bs.offcanvas', fixNavbarGap);
                }
            });


            $("#footer-placeholder").load("footer.html");
        });
    </script>


    <script src="Assets/bootstrap-5.3.7-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
