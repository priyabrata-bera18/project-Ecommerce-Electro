<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Details | Electro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="Assets/bootstrap-5.3.7-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .details-title {
            font-size: 28px;
            font-weight: 700;
        }

        .details-price {
            font-size: 26px;
            color: #e60023;
            font-weight: 700;
        }

        .thumb-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            padding: 6px;
            border: 2px solid #ddd;
            cursor: pointer;
            border-radius: 6px;
        }

        .thumb-img.active {
            border-color: #e60023;
        }

        .main-img {
            width: 100%;
            height: 400px;
            object-fit: contain;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
        }

        /* Tabs */
        .nav-tabs .nav-link {
            font-weight: 600;
            color: #444;
        }

        .nav-tabs .nav-link.active {
            background: #e60023;
            color: #fff;
        }

        /* Related Products */
        .related-box {
            border-radius: 10px;
            padding: 10px;
            transition: .3s;
            cursor: pointer;
            background: #fff;
        }

        .related-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        }

        .related-box img {
            height: 150px;
            object-fit: contain;
        }

        .related-add {
            display: none;
        }

        .related-box:hover .related-add {
            display: inline-block;
        }
    </style>

</head>

<body>

    <div id="header-placeholder"></div>

    <div class="container py-5">

        <div class="row g-4" id="prodDetails"></div>

        <hr class="my-5">

        <!-- Tabs Section -->
        <ul class="nav nav-tabs" id="detailsTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab"
                    data-bs-target="#desc">Description</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab"
                    data-bs-target="#specs">Specifications</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab"
                    data-bs-target="#reviews">Reviews</button></li>
        </ul>

        <div class="tab-content border p-4" style="border-radius:8px; border-top:none;">
            <div class="tab-pane fade show active" id="desc"></div>
            <div class="tab-pane fade" id="specs"></div>
            <div class="tab-pane fade" id="reviews">
                <p>No reviews yet</p>
            </div>
        </div>

        <hr class="my-5">

        <!-- Related Products -->
        <h4 class="fw-bold mb-4">You May Also Like</h4>
        <div class="row g-4" id="relatedProducts"></div>

    </div>

    <div id="footer-placeholder"></div>

    <script>
        $("#header-placeholder").load("header.html", () => {
            updateHeaderCartCount();
            updateWishlistCount();
        });
        $("#footer-placeholder").load("footer.html");

        let id = new URLSearchParams(location.search).get("id");
        let allProducts = JSON.parse(localStorage.getItem("allProducts")) || [];
        let product = allProducts.find(p => p.id == id);

        if (!product) {
            $("#prodDetails").html("<h3 class='text-center text-danger'>Product Not Found</h3>");
            return;
        }

        $("#prodDetails").html(`
  <div class="col-lg-5 text-center">
    <img src="${product.images[0]}" id="mainImg" class="main-img mb-3">
    <div class="d-flex gap-2 justify-content-center">
      ${product.images.map((img, index) => `
        <img src="${img}" class="thumb-img ${index == 0 ? 'active' : ''}" onclick="changeImg('${img}',this)">
      `).join("")}
    </div>
  </div>

  <div class="col-lg-7">
    <h2 class="details-title">${product.title}</h2>
    <p class="details-price">₹${product.price.toLocaleString()}</p>

    <p>${product.shortDesc}</p>

    <strong>Colors:</strong>
    <div class="d-flex gap-2 mt-1 mb-3">
      ${product.colors.map(c => `
        <span class="rounded-circle" style="width:22px;height:22px;background:${c.toLowerCase()};border:2px solid #333"></span>
      `).join("")}
    </div>

    <div class="d-flex gap-3">
      <button class="btn btn-danger px-4" onclick="addToCart(${product.id})">🛒 Add to Cart</button>
      <button class="btn btn-outline-danger px-4" onclick="toggleWishlist(${product.id})">❤ Wishlist</button>
    </div>

    <p class="mt-4"><strong>SKU:</strong> ${product.sku}</p>
    <p><strong>Brand:</strong> ${product.brand}</p>
    <p><strong>Category:</strong> ${product.category}</p>
  </div>
`);

        $("#desc").html(`<p>${product.fullDesc || "No description available"}</p>`);
        $("#specs").html(`
  <ul>
    ${product.specifications ? product.specifications.map(s => `<li>${s}</li>`).join("") : "<li>No specs available</li>"}
  </ul>
`);

        // Change Main Image
        function changeImg(src, element) {
            $("#mainImg").attr("src", src);
            $(".thumb-img").removeClass("active");
            $(element).addClass("active");
        }

        // ================= Related Products =================
        let related = allProducts.filter(p => p.category === product.category && p.id != product.id).slice(0, 4);

        $("#relatedProducts").html(
            related.map(r => `
    <div class="col-md-3">
      <div class="related-box text-center p-3" onclick="openProduct(${r.id})">
        <img src="${r.images[0]}" class="w-100">
        <h6 class="mt-2">${r.title}</h6>
        <p class="price-tag">₹${r.price.toLocaleString()}</p>
        <button class="btn btn-sm btn-danger related-add" onclick="addToCart(${r.id}); event.stopPropagation();">Add</button>
      </div>
    </div>
  `).join("")
        );

        // ----------------- Functions -----------------
        function openProduct(id) {
            location.href = "product-details.html?id=" + id;
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem("electroCart")) || [];
            let exist = cart.find(i => i.id === id);
            if (exist) exist.qty++;
            else cart.push({ ...allProducts.find(p => p.id === id), qty: 1 });

            localStorage.setItem("electroCart", JSON.stringify(cart));
            updateHeaderCartCount();
        }

        function toggleWishlist(id) {
            let w = JSON.parse(localStorage.getItem("wishlist")) || [];
            let exist = w.find(i => i.id == id);
            if (exist) w = w.filter(i => i.id != id);
            else w.push(allProducts.find(p => p.id == id));

            localStorage.setItem("wishlist", JSON.stringify(w));
            updateWishlistCount();
        }
    </script>

</body>

</html>
