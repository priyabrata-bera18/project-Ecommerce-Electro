<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Shop | Electro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="Assets/bootstrap-5.3.7-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="products.js"></script> <!-- Product DB -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .shop-container {
            padding-top: 40px;
        }

        .sidebar-box {
            background: #fff;
            padding: 15px;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.08);
            border-radius: 10px;
        }

        .filter-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .product-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            transition: all .3s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .product-card img {
            height: 220px;
            width: 100%;
            object-fit: contain;
            background: #f7f7f7;
            border-radius: 6px;
            padding: 15px;
        }

        .product-card h5 {
            min-height: 45px;
        }

        .price-tag {
            font-weight: bold;
            color: #e60000;
            font-size: 18px;
        }

        .cart-btn {
            width: 75%;
        }

        .eye-btn {
            width: 22%;
            background: #fff;
            border: 1px solid #ddd;
        }

        .eye-btn:hover {
            background: #ffd8d8;
        }

        .wishlist-heart {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
        }

        .wishlist-heart.active {
            color: red;
            transform: scale(1.2);
            transition: .3s;
        }

        .sort-select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 2px solid #ddd;
        }

        .pagination button {
            padding: 6px 12px;
            margin: 3px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
        }

        .pagination .active {
            background: #e60000;
            color: #fff;
        }

        .empty-list {
            text-align: center;
            padding: 60px 0;
            font-size: 20px;
            color: #777;
        }

        #loader {
            width: 50px;
            height: 50px;
            border: 5px dotted #f28b00;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: auto;
            display: none;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .eye-btn i {
            font-size: 18px;
            color: #000;
        }

        .wishlist-heart.active {
            color: #e60000 !important;
        }
    </style>

</head>

<body>

    <div id="header-placeholder"></div>

    <div class="container shop-container">

        <div class="row g-4">

            <!-- Filter Sidebar -->
            <div class="col-lg-3">

                <div class="sidebar-box mb-4">
                    <div class="filter-title">Categories</div>
                    <div id="category-filter"></div>
                </div>

                <div class="sidebar-box mb-4">
                    <div class="filter-title">Brands</div>
                    <div id="brand-filter"></div>
                </div>

                <div class="sidebar-box mb-4">
                    <div class="filter-title">Price</div>
                    <input type="range" min="0" max="150000" value="150000" id="priceRange" class="form-range">
                    <p class="mt-2 small">Max Price: ₹<span id="maxPriceText">150000</span></p>
                </div>

            </div>

            <!-- Product List Area -->
            <div class="col-lg-9">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold">All Products</h4>
                    <select class="sort-select" id="sortSelect">
                        <option value="default">Sort by</option>
                        <option value="low">Price: Low to High</option>
                        <option value="high">Price: High to Low</option>
                    </select>
                </div>

                <div id="loader"></div>
                <div class="row g-4" id="product-grid"></div>
                <div id="empty-message" class="empty-list d-none">No products found</div>
                <div class="pagination text-center mt-4" id="pagination"></div>

            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <div class="modal fade" id="quickViewModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">

                <button class="btn-close ms-auto m-2" data-bs-dismiss="modal"></button>

                <div class="modal-body row g-4">

                    <!-- Left: Image Gallery -->
                    <div class="col-lg-6 text-center">
                        <img id="modalMainImg" class="img-fluid border rounded"
                            style="height:350px; object-fit:contain;">
                        <div id="modalThumbs" class="d-flex gap-2 mt-3 justify-content-center"></div>
                    </div>

                    <!-- Right: Product Info -->
                    <div class="col-lg-6">
                        <h4 id="modalTitle" class="fw-bold"></h4>
                        <p class="price-tag fs-4" id="modalPrice"></p>

                        <p id="modalShortDesc" class="text-muted"></p>

                        <div class="mt-3">
                            <strong>Color:</strong>
                            <div id="modalColors" class="d-flex gap-2 mt-2"></div>
                        </div>

                        <div class="d-flex align-items-center gap-3 mt-3">
                            <label class="fw-bold">Qty:</label>
                            <input type="number" id="modalQty" value="1" min="1" class="form-control"
                                style="width:65px;">
                        </div>

                        <div class="mt-4 d-flex gap-3">
                            <button class="btn btn-danger w-50" id="modalAddCart">
                                🛒 Add to Cart
                            </button>
                            <button class="btn btn-outline-danger w-25" id="modalWishlist">
                                ❤
                            </button>
                        </div>

                        <div class="mt-4 small">
                            <p><strong>SKU:</strong> <span id="modalSKU"></span></p>
                            <p><strong>Brand:</strong> <span id="modalBrand"></span></p>
                            <p><strong>Category:</strong> <span id="modalCat"></span></p>
                            <p><strong>Warranty:</strong> <span id="modalWarranty"></span></p>
                            <p><strong>Return Policy:</strong> <span id="modalReturn"></span></p>
                        </div>

                        <button class="btn btn-dark mt-3 w-100" id="modalFullDetails">
                            View Full Details →
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script>
        $("#header-placeholder").load("header.html", () => {
            updateHeaderCartCount();
            updateWishlistCount();
        });
        $("#footer-placeholder").load("footer.html");

        if (!localStorage.getItem("allProducts") && Array.isArray(products)) {
            localStorage.setItem("allProducts", JSON.stringify(products));
        }

        if (!Array.isArray(JSON.parse(localStorage.getItem("allProducts")))) {
            localStorage.setItem("allProducts", JSON.stringify(products));
        }

        let allProducts = JSON.parse(localStorage.getItem("allProducts")) || [];

        let filtered = [...allProducts];
        let itemsPerPage = 6;
        let currentPage = 1;

        initFilters();
        renderProducts();

        function initFilters() {
            let categories = [...new Set(allProducts.map(p => p.category))];
            let brands = [...new Set(allProducts.map(p => p.brand))];

            $("#category-filter").html(`
        <label><input type="radio" name="cat" value="all" checked> All</label><br>
    ${categories.map(c => {
                let display = c.replace(/([A-Z])/g, ' $1').trim();
                return `<label><input type="radio" name="cat" value="${c}"> ${display}</label><br>`;
            }).join("")}
    `);

            $("#brand-filter").html(`
        <label><input type="radio" name="brand" value="all" checked> All</label><br>
        ${brands.map(b => `<label><input type="radio" name="brand" value="${b}"> ${b}</label><br>`).join("")}
    `);
        }

        $("input[name='cat'], input[name='brand'], #priceRange").on("change", function () {
            filterProducts();
        });

        $("#sortSelect").on("change", function () {
            let val = $(this).val();
            if (val === "low") filtered.sort((a, b) => a.price - b.price);
            if (val === "high") filtered.sort((a, b) => b.price - a.price);
            if (val === "default") filtered = [...allProducts];
            currentPage = 1;
            renderProducts();
        });

        function filterProducts() {
            let cat = $("input[name='cat']:checked").val();
            let brand = $("input[name='brand']:checked").val();
            let maxPrice = $("#priceRange").val();

            $("#maxPriceText").text(maxPrice);

            filtered = allProducts.filter(p =>
                (cat === "all" || p.category === cat) &&
                (brand === "all" || p.brand === brand) &&
                p.price <= maxPrice
            );

            currentPage = 1;
            renderProducts();
        }

        function goToPage(x) {
            currentPage = x;
            renderProducts();
        }

        function renderProducts() {
            $("#loader").show();
            setTimeout(() => {
                $("#loader").hide();

                if (filtered.length === 0) {
                    $("#product-grid").html("");
                    $("#empty-message").removeClass("d-none");
                    $("#pagination").html("");
                    return;
                }
                $("#empty-message").addClass("d-none");

                let start = (currentPage - 1) * itemsPerPage;
                let end = start + itemsPerPage;
                let products = filtered.slice(start, end);

                let html = "";
                products.forEach(item => {
                    const isFav = isInWishlist(item.id) ? "active" : "";

                    html += `
            <div class="col-md-4">
            <div class="product-card p-3">
                <i class="fa-solid fa-heart wishlist-heart ${isFav}" data-id="${item.id}"></i>
                <img src="${item.images[0]}">
                <h6>${item.category}</h6>
                <h5>${item.title}</h5>
                <p class="price-tag">₹${item.price.toLocaleString()}</p>

                <div class="d-flex justify-content-between mt-2">
                <button class="btn btn-danger btn-sm cart-btn addCart" data-id="${item.id}">
                    🛒 Add to Cart
                </button>
                <button class="btn btn-sm eye-btn quickView" data-id="${item.id}">
                    <i class="bi bi-eye"></i>
                </button>
                </div>
            </div>
            </div>`;
                });

                $("#product-grid").html(html);

                let totalPages = Math.ceil(filtered.length / itemsPerPage);
                let pg = "";
                for (let i = 1; i <= totalPages; i++) {
                    pg += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                $("#pagination").html(pg);

            }, 300);
        }

        // ----------------- WISHLIST + CART -----------------
        function isInWishlist(id) {
            let w = JSON.parse(localStorage.getItem("wishlist")) || [];
            return w.some(i => i.id === id);
        }

        $(document).on("click", ".wishlist-heart", function () {
            let id = $(this).data("id");
            let w = JSON.parse(localStorage.getItem("wishlist")) || [];
            let exist = w.find(i => i.id === id);

            if (exist) {
                w = w.filter(i => i.id !== id);
                $(this).removeClass("active");
            } else {
                let item = allProducts.find(p => p.id === id);
                w.push(item);
                $(this).addClass("active");
            }
            localStorage.setItem("wishlist", JSON.stringify(w));
            updateWishlistCount();
        });

        $(document).on("click", ".addCart", function () {
            let id = $(this).data("id");
            let cart = JSON.parse(localStorage.getItem("electroCart")) || [];
            let exist = cart.find(i => i.id === id);

            if (exist) exist.qty++;
            else {
                let item = allProducts.find(p => p.id === id);
                cart.push({ ...item, qty: 1 });
            }

            localStorage.setItem("electroCart", JSON.stringify(cart));
            updateHeaderCartCount();
        });

        $(document).on("click", ".quickView", function () {
            let id = $(this).data("id");
            localStorage.setItem("selectedProduct", id);
            showQuickViewModal(id); 
        });

        // =========================
        // QUICK VIEW MODAL SCRIPT
        // =========================
        function showQuickViewModal(id) {
            const item = allProducts.find(p => p.id === id);
            if (!item) return;

            $("#modalTitle").text(item.title);
            $("#modalPrice").text("₹" + item.price.toLocaleString());
            $("#modalShortDesc").text(item.shortDesc);
            $("#modalSKU").text(item.sku);
            $("#modalBrand").text(item.brand);
            $("#modalCat").text(item.category);
            $("#modalWarranty").text(item.warranty);
            $("#modalReturn").text(item.returnPolicy);

            let colorHtml = "";
            item.colors.forEach((c, index) => {
                colorHtml += `
            <div class="color-option border rounded-circle"
                data-color="${c}"
                style="width:25px;height:25px;background:${c.toLowerCase()};
                cursor:pointer;border:2px solid ${index === 0 ? '#000' : '#ccc'};">
            </div>`;
            });
            $("#modalColors").html(colorHtml);

            $(".color-option").on("click", function () {
                $(".color-option").css("border", "2px solid #ccc");
                $(this).css("border", "2px solid black");
            });

            $("#modalMainImg").attr("src", item.images[0]);

            let imgHtml = "";
            item.images.forEach((img, index) => {
                imgHtml += `
            <img src="${img}"
                class="rounded"
                style="width:60px;height:60px;cursor:pointer;border:2px solid ${index === 0 ? '#000' : '#ccc'}"
                onclick="$('#modalMainImg').attr('src','${img}')">`;
            });
            $("#modalThumbs").html(imgHtml);

            $("#modalQty").val(1);

            const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
            const exist = wishlist.some(i => i.id === id);
            $("#modalWishlist").toggleClass("btn-danger", exist);

            $("#modalAddCart").off().on("click", () => {
                let qty = parseInt($("#modalQty").val());

                let cart = JSON.parse(localStorage.getItem("electroCart")) || [];

                let existCart = cart.find(i => i.id === id);
                if (existCart) existCart.qty += qty;
                else cart.push({ ...item, qty });

                localStorage.setItem("electroCart", JSON.stringify(cart));
                updateHeaderCartCount();
            });

            $("#modalWishlist").off().on("click", () => {
                let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
                let exist = wishlist.find(i => i.id === id);

                if (exist) {
                    wishlist = wishlist.filter(i => i.id !== id);
                    $("#modalWishlist").removeClass("btn-danger");
                } else {
                    wishlist.push(item);
                    $("#modalWishlist").addClass("btn-danger");
                }
                localStorage.setItem("wishlist", JSON.stringify(wishlist));
                updateWishlistCount();
            });

            $("#modalFullDetails").off().on("click", () => {
                window.location.href = `product-details.html?id=${id}`;
            });

            let modal = new bootstrap.Modal(document.getElementById("quickViewModal"));
            modal.show();
        }

        $(document).ready(function () {
            $(".navbar-nav .nav-link").removeClass("active");
            $(".navbar-nav .nav-link[href='shop.html']").addClass("active");
        });
    </script>

</body>

</html>
